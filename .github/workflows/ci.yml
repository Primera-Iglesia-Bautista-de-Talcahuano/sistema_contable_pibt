name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm run lint

      - name: TypeScript Typecheck
        run: pnpm run typecheck

      - name: Admin client whitelist check
        run: |
          # createSupabaseAdminClient bypasses RLS — only whitelisted files may import it.
          # Test files are excluded from the check.
          ALLOWED="lib/supabase/admin\.ts|lib/supabase/server\.ts|lib/utils/folio\.ts|lib/rate-limit/index\.ts|services/audit/audit\.service\.ts|services/users/users\.service\.ts|services/dashboard/dashboard\.service\.ts|services/budget/budget\.service\.ts|services/email/workflow-emails\.service\.ts|services/google/movement-postprocess\.ts|services/google/sheets-sync\.ts|services/settlements/settlements\.service\.ts|app/api/reminders/route\.ts|app/api/auth/forgot-password/route\.ts|app/api/auth/activate/route\.ts|app/api/attachments/|app/actions/auth\.ts|app/activate/page\.tsx"
          VIOLATIONS=$(grep -rl "createSupabaseAdminClient" --include="*.ts" --include="*.tsx" . \
            | grep -v "node_modules\|\.next\|\.worktrees\|__tests__\|__integration__" \
            | grep -vE "$ALLOWED") || true
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ Admin client imported outside whitelist:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ Admin client whitelist OK"

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-and-typecheck]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

  migrations:
    name: Supabase Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-and-typecheck]
    if: github.ref == 'refs/heads/main'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy database migrations
        run: supabase db push
